openapi: 3.0.0
info:
  description: A simple API for managing products using Flask and MongoDB.
  title: Product API
  version: 1.0.0
servers:
- url: http://localhost:8080/v1
paths:
  /products:
    get:
      operationId: get_products
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Product"
                type: array
          description: A list of products
      summary: Get all products
      tags:
      - Product
      x-openapi-router-controller: openapi_server.controllers.product_controller
    post:
      operationId: add_product
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Product created successfully
      summary: Create a new product
      tags:
      - Product
      x-openapi-router-controller: openapi_server.controllers.product_controller
  /products/{id}:
    delete:
      operationId: delete_product
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Product deleted successfully
        "404":
          description: Product not found
      summary: Delete a product
      tags:
      - Product
      x-openapi-router-controller: openapi_server.controllers.product_controller
    get:
      operationId: get_product_by_id
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Product details
        "404":
          description: Product not found
      summary: Get a product by ID
      tags:
      - Product
      x-openapi-router-controller: openapi_server.controllers.product_controller
    put:
      operationId: update_product
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Product updated successfully
        "404":
          description: Product not found
      summary: Update a product
      tags:
      - Product
      x-openapi-router-controller: openapi_server.controllers.product_controller
components:
  schemas:
    Product:
      example:
        price: 0.8008281904610115
        name: name
        description: description
        id: id
      properties:
        id:
          title: id
          type: string
        name:
          title: name
          type: string
        price:
          title: price
          type: number
        description:
          title: description
          type: string
      title: Product
      type: object
    ProductInput:
      example:
        price: 0.8008281904610115
        name: name
        description: description
      properties:
        name:
          title: name
          type: string
        price:
          title: price
          type: number
        description:
          title: description
          type: string
      required:
      - name
      - price
      title: ProductInput
      type: object
