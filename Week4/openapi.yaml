openapi: 3.0.0
info:
  title: Book Management API
  description: API đơn giản để quản lý kho sách trong thư viện.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /books:
    get:
      summary: Lấy danh sách tất cả các cuốn sách
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      summary: Thêm một cuốn sách mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Đã tạo thành công

  /books/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Lấy thông tin chi tiết một cuốn sách
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
    put:
      summary: Cập nhật thông tin sách
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '200':
          description: Cập nhật thành công
    delete:
      summary: Xóa một cuốn sách
      responses:
        '204':
          description: Đã xóa thành công

components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: string
          example: "B001"
        title:
          type: string
          example: "Sapiens: Lược sử loài người"
        author:
          type: string
          example: "Yuval Noah Harari"
        publishedYear:
          type: integer
          example: 2011
        genre:
          type: string
          example: "Khoa học, Lịch sử"
    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
        author:
          type: string
        publishedYear:
          type: integer
          example: 2011
        genre:
          type: string
          example: "Khoa học, Lịch sử"
